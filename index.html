<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=14" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FocusOS</title>
    <meta name="description" content="FocusOS adapts to your real attention span — not a generic 25-minute timer." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://focusos.live/" />
    <meta property="og:title" content="FocusOS" />
    <meta property="og:description" content="Study smarter. Focus longer." />
    <meta property="og:image" content="/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FocusOS" />
    <meta name="twitter:description" content="Study smarter. Focus longer." />
    <meta name="theme-color" content="#0a0a0b" />
    <!-- manifest disabled: triggers vite v8 import-analysis bug -->
    <!-- <link rel="manifest" href="/manifest.json" /> -->
    <script>
      (function() {
        var c = localStorage.getItem('focusos_accent');
        if (c) {
          document.documentElement.style.setProperty('--accent', c);
          document.documentElement.style.setProperty('--lime', c);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

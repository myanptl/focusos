name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Non-blocking: the existing codebase has known lint findings. This step
      # surfaces them without failing the pipeline so they can be cleaned up
      # incrementally. Promote to a hard gate once src/ is lint-clean.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
